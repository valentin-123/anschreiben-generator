<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Anschreiben Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Anschreiben Generator</h1>
        </header>
        <main>
            <section>
                <h2>Generate Your Anschreiben</h2>
                <textarea id="inputText" placeholder="Enter your details here..."></textarea>
                <button id="generateButton">Generate Anschreiben</button>
                <div id="outputContainer"></div>
            </section>
            <section id="paywall" style="display:none;">
                <h2>Subscription Required</h2>
                <p>Please subscribe to use the full features of the app.</p>
                <button id="subscribeButton">Subscribe Now</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 AI Anschreiben Generator</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

<script>
    const apiKey =
    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
    const generateButton = document.getElementById('generateButton');
    const outputContainer = document.getElementById('outputContainer');
    const paywall = document.getElementById('paywall');

    let quota = 5; // Set a quota limit for free users

    generateButton.addEventListener('click', async () => {
        if (quota <= 0) {
            paywall.style.display = 'block';
            return;
        }

        const userInput = document.getElementById('inputText').value;
        try {
            const response = await fetch('https://api.claude.ai/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({ input: userInput })
            });

            const data = await response.json();
            outputContainer.innerText = data.output;
            quota--;
        } catch (error) {
            console.error('Error:', error);
            outputContainer.innerText = 'An error occurred. Please try again.';
        }
    });
</script>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #fff;
        color: #333;
    }
    .container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
    }
    header, footer {
        text-align: center;
        padding: 10px;
        background-color: #efefef;
    }
    button {
        margin-top: 10px;
        padding: 10px;
        cursor: pointer;
    }
    textarea {
        width: 100%;
        height: 100px;
    }
    /* Dark mode styles */
    body.dark-mode {
        background-color: #333;
        color: #fff;
    }
    body.dark-mode .container {
        background-color: #444;
        border-color: #555;
    }
</style>
